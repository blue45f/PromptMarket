name: Auto-merge on green

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        contains(github.event.pull_request.labels.*.name, 'automerge') ||
        contains(github.event.pull_request.labels.*.name, 'auto-merge')
      )
    steps:
      - name: Enforce CodeRabbit gate result before merge
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          checks='["Quality gate","CodeRabbit review gate"]'

          while IFS= read -r check; do
            status=$(gh pr checks "$PR_NUMBER" --json name,state -q "$(printf '.[] | select(.name == "%s") | .state' "$check")")
            if [ -z "$status" ] || [ "$status" != "success" ]; then
              echo "::notice title=Auto-merge skipped::Required check '$check' has not passed yet (state=$status)."
              exit 0
            fi
          done < <(echo "$checks" | jq -r '.[]')

          echo "All required checks passed. Continuing with auto-merge."

      - name: Enable squash auto-merge
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
