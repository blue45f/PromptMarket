packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@firebase/util': false
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  '@swc/core': true
  argon2: true
  esbuild: true
  prisma: true
  protobufjs: true
  unrs-resolver: true
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/engines'
  - '@sentry/cli'
  - '@swc/core'
  - argon2
  - esbuild
  - prisma
  - protobufjs
  - unrs-resolver

minimumReleaseAgeExclude:
  - enhanced-resolve
  - hasown
  - lucide-react
  - react-router
  - react-router-dom
  - tldts-core
  - zustand
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/eslint-config@4.0.0'
  - '@heejun/auth@0.3.0'
  - '@heejun/contracts@0.1.0'
  - '@heejun/core-server@0.1.0'
  - '@heejun/deskcloud@0.1.0'

overrides:
  handlebars: '>=4.7.9'
  multer: '>=2.2.0'
  undici: '^7.28.0'
  ws: '>=8.21.0'
  form-data: '>=4.0.6'
  hono: '>=4.12.25'
  find-my-way: '>=8.2.2'
  '@fastify/middie': '>=9.3.2'
  fastify: '>=5.7.2'
  fast-uri: '>=3.1.2'
  path-to-regexp: '>=6.3.0'
  serialize-javascript: '>=7.0.3'
  piscina: '>=4.9.3'
  drizzle-orm: '>=0.45.2'
  vitest: '>=4.1.9'
  '@vitest/coverage-v8': '>=4.1.9'
  '@vitest/ui': '>=4.1.9'
  vite: '>=8.0.16'
  jspdf: '>=4.2.1'

auditConfig:
  ignoreGhsas:
    - GHSA-2p57-rm9w-gvfp

minimumReleaseAge: 0
