packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': true
  argon2: true
  esbuild: true
  prisma: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - enhanced-resolve
  - hasown
  - lucide-react
  - react-router
  - react-router-dom
  - tldts-core
  - zustand
  - '@heejun/prettier-config@3.0.0'
  - '@heejun/eslint-config@4.0.0'
  - '@heejun/auth@0.3.0'
  - '@heejun/contracts@0.1.0'
  - '@heejun/core-server@0.1.0'
