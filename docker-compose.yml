services:
  postgres:
    image: postgres:16-alpine
    container_name: pm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: promptmarket
      POSTGRES_PASSWORD: promptmarket
      POSTGRES_DB: promptmarket
    ports:
      - "5432:5432"
    volumes:
      - pm-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptmarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://promptmarket:promptmarket@postgres:5432/promptmarket
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: pm-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pm-pg-data:
