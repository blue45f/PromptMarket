<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="PromptMarket">
  <defs>
    <!-- Deep space cyber gradient -->
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="60%" stop-color="#0d1527" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Cyber electric gradient (lime to cyan/violet) -->
    <linearGradient id="volt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Glowing shadow for the logo mark -->
    <filter id="neon" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#06b6d4" flood-opacity="0.5" />
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#tile)" stroke="#1e293b" stroke-width="1.5" />
  
  <g filter="url(#neon)">
    <!-- Main P letter stylized with terminal cursor -->
    <path d="M20 15h17.5c8.5 0 14 5.1 14 12.6 0 7.7-5.9 12.8-14.8 12.8H30.6V51H20V15Zm10.6 9.1v12h6.3c3.7 0 6.1-2.2 6.1-6s-2.4-6-6.1-6h-6.3Z" fill="url(#volt)" />
    <!-- Glowing cyber terminal symbol inside P -->
    <path d="M31 24.5h6c3.4 0 5.4 1.9 5.4 5.1 0 3.1-2.1 5-5.4 5h-6V24.5Z" fill="#0b0f19" />
  </g>
  
  <!-- Glowing online status dot -->
  <circle cx="51" cy="51" r="5" fill="#22d3ee" stroke="#0b0f19" stroke-width="2" />
</svg>
