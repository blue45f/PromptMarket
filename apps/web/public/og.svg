<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="PromptMarket 공유 이미지">
  <defs>
    <!-- Deep space cyber gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0f19" />
      <stop offset="0.6" stop-color="#0f172a" />
      <stop offset="1" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Cyber electric gradient (lime to cyan) -->
    <linearGradient id="volt" x1="88" y1="120" x2="560" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a3e635" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <!-- Logo tile background -->
    <linearGradient id="tile" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0f19" />
      <stop offset="0.6" stop-color="#0d1527" />
      <stop offset="1" stop-color="#1e1b4b" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#06b6d4" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Base canvas -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1080" cy="92" r="240" fill="#22d3ee" opacity="0.08" />
  <circle cx="150" cy="560" r="220" fill="#a3e635" opacity="0.06" />
  <path d="M0 524C220 460 380 588 560 524s320-70 640 14v92H0Z" fill="#020617" opacity="0.8" />

  <!-- Brand logomark (matches updated icon.svg) -->
  <g transform="translate(88 74) scale(1.55)" filter="url(#glow)">
    <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#tile)" stroke="#1e293b" stroke-width="1.5" />
    <path d="M20 15h17.5c8.5 0 14 5.1 14 12.6 0 7.7-5.9 12.8-14.8 12.8H30.6V51H20V15Zm10.6 9.1v12h6.3c3.7 0 6.1-2.2 6.1-6s-2.4-6-6.1-6h-6.3Z" fill="url(#volt)" />
    <path d="M31 24.5h6c3.4 0 5.4 1.9 5.4 5.1 0 3.1-2.1 5-5.4 5h-6V24.5Z" fill="#0b0f19" />
    <circle cx="51" cy="51" r="5" fill="#22d3ee" stroke="#0b0f19" stroke-width="2" />
  </g>

  <!-- Wordmarks -->
  <text x="190" y="118" fill="#f8fafc" font-size="42" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">PromptMarket</text>
  <text x="192" y="156" fill="#22d3ee" font-size="19" font-weight="700" letter-spacing="6" font-family="JetBrains Mono, ui-monospace, monospace">PROMPTS · SKILLS · MCP · AGENTS</text>

  <!-- Copy texts -->
  <text x="88" y="296" fill="#f8fafc" font-size="74" font-weight="800" letter-spacing="-2" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">검증된 AI 프롬프트를,</text>
  <text x="88" y="386" fill="#a3e635" font-size="78" font-weight="900" letter-spacing="-2" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">바로 프로덕션으로.</text>

  <!-- Description -->
  <text x="88" y="462" fill="#94a3b8" font-size="28" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">Claude · GPT-5 · Gemini로 서비스를 고도화하는</text>
  <text x="88" y="504" fill="#94a3b8" font-size="28" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">빌더들의 프롬프트 · 스킬 · MCP 서버 마켓플레이스.</text>

  <!-- Info footer -->
  <circle cx="92" cy="566" r="4.5" fill="#22d3ee" />
  <text x="116" y="575" fill="#64748b" font-size="22" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">프롬프트 · CLAUDE.md · Claude Code 스킬 · MCP 서버 · 서브에이전트</text>
</svg>
