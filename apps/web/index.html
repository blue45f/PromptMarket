    <title>PromptMarket — battle-tested prompts, agents & skills</title>
    <!-- No-FOUC theme bootstrap: 페인트 전에 .dark 클래스를 확정해 다크모드 첫 진입 깜빡임을 막는다.
         저장 형식은 zustand 스토어의 평문 키 'pm_theme'('light'|'dark'|'system')와 일치하며,
         resolve 로직(system → prefers-color-scheme)도 src/store/theme.ts 와 동일하게 맞춘다.
         같은 신호(.dark on <html>)를 적용하므로 이후 initTheme() 가 동일 결과를 재계산 → 깜빡임/플립 없음. -->
    <script>
      ;(function () {
        try {
          var mode = localStorage.getItem('pm_theme')
          if (mode !== 'light' && mode !== 'dark' && mode !== 'system') mode = 'system'
          var dark =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {
          /* localStorage 접근 불가 등 — 기본 라이트 테마로 폴백 */
        }
      })()
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>

  </body>
