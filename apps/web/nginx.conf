server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SEO sitemap proxied to the API so it stays in sync with the catalog.
  location = /sitemap.xml {
    proxy_pass http://api:3000/api/seo/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # robots.txt is statically built into the SPA bundle (apps/web/public).
  location = /robots.txt {
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
